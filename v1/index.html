<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Linktree</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    .profile {
      margin-top: 30px;
    }

    .profile img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid white;
    }

    .profile h1 {
      margin: 10px 0 5px;
    }

    .profile p {
      font-size: 14px;
      opacity: 0.9;
    }

    .links {
      margin-top: 30px;
    }

    .link-btn {
      display: block;
      background: white;
      color: #333;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .link-btn:hover {
      background: #ddd;
      transform: scale(1.05);
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Perfil -->
    <div class="profile">
      <img src="istockphoto-523761634-612x612.jpg" alt="Foto de perfil">
      <h1>Angel Rengifo</h1>
      <p>🚀 Creador de contenido | 💻 Developer | 🌎 Explorador</p>
    </div>

    <!-- Links -->
    <div class="links">
      <a class="link-btn" href="https://instagram.com" target="_blank">Instagram</a>
      <a class="link-btn" href="https://tiktok.com" target="_blank">TikTok</a>
      <a class="link-btn" href="https://youtube.com" target="_blank">YouTube</a>
      <a class="link-btn" href="https://github.com" target="_blank">GitHub</a>
      <a class="link-btn" href="https://linkedin.com" target="_blank">LinkedIn</a>
    </div>

    <footer>
      © 2026 - Angel Rengifo
    </footer>

  </div>

</body>
</html>
